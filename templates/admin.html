<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - CIT/CQT Session Download</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-header">
            <div class="login-badge">Admin Only</div>
            <h1>Download Session Data</h1>
            <p class="subtitle">Enter administrator password to access session archives</p>
        </div>

        <form action="/admin/verify" method="POST" class="login-form">
            <div class="form-group">
                <label for="password">Admin Password</label>
                <input type="password" id="password" name="password" placeholder="Enter admin password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">
                Access Downloads
            </button>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}
        </form>

        <div class="login-footer">
            <p><a href="/" style="color:var(--text-muted);font-size:11px;">← Back to login</a></p>
        </div>
    </div>
</body>
</html>
